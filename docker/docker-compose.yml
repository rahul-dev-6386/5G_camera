version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: smart-campus-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - STORAGE_DIR=/app/storage
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - FRONTEND_ORIGIN=http://localhost:5173
      - LOG_FORMAT=json
      - LOG_DIR=/app/logs
      - YOLO_DEVICE=auto
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - smart-campus-network

  mongodb:
    image: mongo:7.0
    container_name: smart-campus-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=smart_campus
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    restart: unless-stopped
    networks:
      - smart-campus-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: smart-campus-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - smart-campus-network

  prometheus:
    image: prom/prometheus:latest
    container_name: smart-campus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - smart-campus-network

  grafana:
    image: grafana/grafana:latest
    container_name: smart-campus-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - smart-campus-network

volumes:
  mongodb_data:
  mongodb_config:
  prometheus_data:
  grafana_data:

networks:
  smart-campus-network:
    driver: bridge
