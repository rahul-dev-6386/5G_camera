version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: smart-campus-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - STORAGE_DIR=/app/storage
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - FRONTEND_ORIGIN=http://localhost:5173
      - LOG_FORMAT=json
      - LOG_DIR=/app/logs
      - YOLO_DEVICE=auto
    volumes:
      - storage_data:/app/storage
      - logs_data:/app/logs
      - models_data:/app/models
    restart: unless-stopped
    networks:
      - smart-campus-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').getcode() == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mongodb:
    image: mongo:7.0
    container_name: smart-campus-mongodb
    environment:
      - MONGO_INITDB_DATABASE=smart_campus
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    restart: unless-stopped
    networks:
      - smart-campus-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: smart-campus-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - smart-campus-network

  nginx:
    image: nginx:alpine
    container_name: smart-campus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - smart-campus-network

volumes:
  storage_data:
  logs_data:
  models_data:
  mongodb_data:
  mongodb_config:

networks:
  smart-campus-network:
    driver: bridge
